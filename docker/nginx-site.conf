# ============================================================
# Nginx Site Config - Simply Imóveis
# Copie para /etc/nginx/sites-available/simplyimoveis.conf
# e crie symlink em /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    server_name simplyimoveis.com.br www.simplyimoveis.com.br;

    # Redireciona HTTP para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name simplyimoveis.com.br www.simplyimoveis.com.br;

    # SSL - Certbot irá preencher automaticamente
    ssl_certificate /etc/letsencrypt/live/simplyimoveis.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simplyimoveis.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Supabase API (PostgREST, Auth, Storage, Functions)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE para streaming do chat
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
