# ============================================================
# Nginx Reverse Proxy - Simply Imóveis
# REFERÊNCIA — copie e adapte para seu servidor
#
# Este arquivo NÃO é aplicado automaticamente.
# Ele serve como template para integrar com o nginx do host.
#
# Instalação:
#   sudo cp nginx-site.conf /etc/nginx/sites-available/simplyimoveis.conf
#   sudo ln -sf /etc/nginx/sites-available/simplyimoveis.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Para SSL, rode: sudo bash setup-ssl.sh
# ============================================================

# IMPORTANTE: Se você já tem outros sites no nginx, este arquivo
# coexiste sem interferir — cada server_name é independente.

server {
    listen 80;
    server_name DOMINIO.COM.BR www.DOMINIO.COM.BR;
    # ↑ Substitua pelo seu domínio real

    client_max_body_size 50M;

    # Frontend (SPA)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Gateway (Kong → Auth, REST, Storage, Functions)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE para streaming do chat
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}

# Após SSL (certbot --nginx), o bloco HTTPS será adicionado automaticamente.
